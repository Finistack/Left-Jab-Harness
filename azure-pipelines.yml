# Left Jab Harness — CI pipeline (Azure DevOps, GitHub-hosted source)
#
# Lints (shellcheck) and tests (self-contained bash suites) the harness, then builds the
# runtime container image. On `main` (and on a daily schedule) it also pushes the image to the
# configured registry, tagged with a full 3-part semver.
#
# This pipeline is ADO-built but the source lives in a public GitHub repo, so company-
# specific values are NOT committed here — they are supplied as PIPELINE VARIABLES on the
# build definition (or a linked variable group). This keeps the public repo free of any
# environment configuration. Define these when you create the pipeline
# (see src/build/pr-bot/docs/pipeline-setup.md):
#
#   dockerRegistryServiceConnection  - ADO docker-registry service connection name
#   containerRegistry                - container registry login server (e.g. <name>.azurecr.io)
#   imageRepository                  - image repository/name (e.g. left-jab-harness)
#
# Build-only on PRs; build + push on main (mirrors the house PublishArtifact pattern).
# Native GitHub Actions are intentionally out of scope — there is no .github/workflows/.
#
# Build.BuildNumber is pinned to a single monotonic counter (below) so the image tag is always
# a valid 3-part semver. The counter resets only if the pipeline is renamed.

name: $[counter('left-jab-image', 1)]

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/build/**
      - azure-pipelines.yml

# Daily rebuild so base-image (mcr.microsoft.com/dotnet/sdk) + apt/Node/Claude-CLI security
# updates land even when the harness source is unchanged. always:true is required for that:
# always:false skips the run whenever there are no new commits — exactly the case a security
# refresh must still cover — which would also make this schedule redundant with the main CI
# trigger above. The daily tag increment is the intended cost of a freshly patched image.
schedules:
  - cron: '17 7 * * *'
    displayName: Daily bot image (security refresh)
    branches:
      include:
        - main
    always: true

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/build/**
      - azure-pipelines.yml

resources:
  - repo: self

variables:
  vmImageName: 'ubuntu-latest'
  dockerfilePath: 'src/build/pr-bot/Dockerfile'
  # Full-semver image tag. Build.BuildNumber is the monotonic counter pinned via `name:` above,
  # so this renders MAJOR.MINOR.PATCH (e.g. 1.0.7). Bump 1.0 by hand for a real minor/major.
  imageTag: '1.0.$(Build.BuildNumber)'
  ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
    dockerCommand: 'build'
  ${{ else }}:
    dockerCommand: 'buildAndPush'

stages:
  - stage: Validate
    displayName: 'Lint & Test'
    jobs:
      - job: LintTest
        displayName: 'shellcheck + bash suites'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends shellcheck
              shellcheck --version
            displayName: 'Install shellcheck'

          - script: |
              set -euo pipefail
              # All shell scripts (the credential helper has no .sh extension — include it).
              mapfile -t files < <(find src/build -type f -name '*.sh' | sort)
              [ -f src/build/git-credential-ado-pat ] && files+=("src/build/git-credential-ado-pat")
              echo "Linting ${#files[@]} scripts:"; printf '  %s\n' "${files[@]}"
              shellcheck --severity=error "${files[@]}"
            displayName: 'shellcheck (severity=error)'

          - script: |
              set -euo pipefail
              # The suites are self-contained: they extract and exercise the real shipped
              # functions and need no live services. Any non-zero fails the stage.
              fail=0
              shopt -s nullglob
              for t in src/build/test/*.sh; do
                echo "=== $t ==="
                bash "$t" || fail=1
              done
              exit "$fail"
            displayName: 'Run bash test suites'

  - stage: Build
    displayName: 'Build container image'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildImage
        displayName: 'docker build (push on main)'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Docker@2
            displayName: 'Build harness image (and push on main)'
            # DEFERRED (spec 02-image-and-build-pipeline.md): GA wants a dedicated
            # finistackbot.azurecr.io, an Azure-Linux multi-stage image, and digest-pin +
            # cosign sign + SBOM. This proof reuses the existing single-stage Debian image and
            # the shared registry (both supplied as pipeline variables).
            inputs:
              command: $(dockerCommand)
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              # Build context = repo root so COPY src/build resolves and root .dockerignore
              # (secret/state exclusions) is honored.
              buildContext: '$(Build.SourcesDirectory)'
              containerRegistry: $(dockerRegistryServiceConnection)
              # Tag with both the semver (chart-pinnable) and the commit SHA (traceability:
              # the monotonic counter alone can't map an image back to its source commit).
              tags: |
                $(imageTag)
                $(Build.SourceVersion)
                latest
