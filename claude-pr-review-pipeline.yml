# Claude Code PR Review Pipeline (GitHub-targeting)
#
# Runs an AI code review on GitHub pull requests using the Claude Code CLI, then
# posts findings back to the PR via the GitHub REST + GraphQL APIs. This is the
# GitHub-retargeted sibling of the monorepo's ADO-targeting review pipeline; it is
# a SEPARATE pipeline from azure-pipelines.yml (lint/test/build), not a stage in it.
#
# TRIGGER MODEL (important):
#   `trigger: none` disables push/CI builds. The `pr:` block below IS the trigger —
#   ADO registers a GitHub webhook (via the existing `GitHub-LeftJab` service
#   connection) and queues this pipeline on PR open/synchronize to `main`. This
#   diverges from the ADO-hosted original (which used `pr: none` + an ADO
#   Build-Validation branch policy); GitHub has no equivalent build-validation
#   policy, so the `pr:` trigger is how a GitHub PR starts the run.
#
# SITE-SPECIFIC CONFIG (never committed — set as pipeline variables / variable group):
#   - Variable group 'Build Pipelines' supplies ANTHROPIC_* (base url, token, models).
#   - GH_REVIEW_PAT (SECRET) — fine-grained PAT of the review BOT account
#       (Pull requests: Read+write on this repo only). Used to post comments, resolve
#       threads, and cast the APPROVE review. Never logged; secret var + env: only.
#   - GH_BOT_LOGIN — the bot account's GitHub login (used for human-reply detection /
#       dedup; the poster falls back to GET /user if unset).
#
# See src/build/pr-bot/docs/claude-review-pipeline-setup.md for provisioning.

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'Build Pipelines'
  # Diff guardrails (overridable on the definition): skip empty diffs, cap huge ones.
  - name: MAX_DIFF_BYTES
    value: '400000'

steps:
  - checkout: self
    # Full history so `git diff origin/<target>...HEAD` has the merge base.
    fetchDepth: 0

  - task: UseNode@1
    displayName: 'Use Node.js 20.x'
    inputs:
      version: '20.x'

  - script: npm install -g @anthropic-ai/claude-code
    displayName: 'Install Claude Code CLI'

  - script: |
      set -euo pipefail
      TARGET="${TARGET_BRANCH:-main}"
      git fetch --no-tags origin "$TARGET" 2>/dev/null || true
      git diff "origin/$TARGET...HEAD" > /tmp/pr-diff.txt || git diff "origin/$TARGET..HEAD" > /tmp/pr-diff.txt

      DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt)
      echo "PR diff size: $DIFF_SIZE bytes (target=$TARGET, cap=${MAX_DIFF_BYTES})"

      if [ "$DIFF_SIZE" -lt 10 ]; then
        echo "No meaningful diff found, skipping review."
        echo "[]" > /tmp/review-results.json
        exit 0
      fi
      if [ "$DIFF_SIZE" -gt "${MAX_DIFF_BYTES}" ]; then
        echo "Diff exceeds ${MAX_DIFF_BYTES} bytes; truncating for the reviewer."
        head -c "${MAX_DIFF_BYTES}" /tmp/pr-diff.txt > /tmp/pr-diff.trunc && mv /tmp/pr-diff.trunc /tmp/pr-diff.txt
      fi

      claude -p \
        "You are a senior code reviewer. Review the following git diff for bugs, security issues, performance problems, and best-practices violations. Report ONLY issues introduced by the added/changed lines. For each issue output an object with: file (repo-relative path, NO leading slash), line (a line number that appears in the diff hunk on the new/RIGHT side), severity (critical, warning, or info), comment. Output a JSON array of such objects. If there are no issues, output []. Output ONLY valid JSON, no prose." \
        --output-format json \
        < /tmp/pr-diff.txt \
        > /tmp/review-results.json 2>/tmp/claude-stderr.log || true

      echo "--- Review Results ---"
      cat /tmp/review-results.json
      echo "--- Stderr ---"
      cat /tmp/claude-stderr.log || true
    displayName: 'Run Claude Code PR Review'
    env:
      ANTHROPIC_BASE_URL: $(ANTHROPIC_BASE_URL)
      ANTHROPIC_AUTH_TOKEN: $(ANTHROPIC_AUTH_TOKEN)
      ANTHROPIC_MODEL: $(ANTHROPIC_MODEL)
      ANTHROPIC_SMALL_FAST_MODEL: $(ANTHROPIC_SMALL_FAST_MODEL)
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: '65536'
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
      MAX_DIFF_BYTES: $(MAX_DIFF_BYTES)
      # Runtime macro — resolved per-run, only inside env: (never a compile-time expression).
      TARGET_BRANCH: $(System.PullRequest.TargetBranchName)

  - script: python3 src/build/github-pr-review.py
    displayName: 'Post Review Comments or Approve PR'
    env:
      # Secret bot PAT + identity. Never echoed; secret var surfaced only here.
      GH_REVIEW_PAT: $(GH_REVIEW_PAT)
      GH_BOT_LOGIN: $(GH_BOT_LOGIN)
      # GitHub PR context — ALL of these are $(...) runtime macros, env: only.
      # PullRequestNumber (the GitHub PR #), NOT PullRequestId (Azure-Repos-only).
      GITHUB_REPOSITORY: $(Build.Repository.Name)
      PR_NUMBER: $(System.PullRequest.PullRequestNumber)
      HEAD_SHA: $(System.PullRequest.SourceCommitId)
      TARGET_BRANCH: $(System.PullRequest.TargetBranchName)

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Review Results'
    condition: always()
    inputs:
      targetPath: '/tmp/review-results.json'
      artifact: 'claude-review'
      publishLocation: 'pipeline'
